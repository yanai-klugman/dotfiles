# Oh My Posh Configuration
version = 2
final_space = true
console_title_template = "{{.Folder}}"

[palette]
# Base colors
base = "#191724"
surface = "#1f1d2e"
overlay = "#26233a"
muted = "#6e6a86"
subtle = "#908caa"

# Primary colors
pine = "#31748f"
foam = "#9ccfd8"
rose = "#ebbcba"
iris = "#c4a7e7"
gold = "#f6c177"

# Complementary colors
love = "#eb6f92"
sage = "#56949f"

# Text colors
text = "#e0def4"
subtext1 = "#908caa"
subtext0 = "#6e6a86"

[[blocks]]
type = "prompt"
alignment = "left"
newline = false

  [[blocks.segments]]
  type = "path"
  style = "plain"
  foreground = "p:foam"
  template = "{{ .Path }} "
  [blocks.segments.properties]
  style = "full"
  folder_separator_icon = " "
  home_icon = "~"

  [[blocks.segments]]
  type = "git"
  style = "plain"
  foreground = "p:rose"
  template = "{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} {{ .Working.String }}{{ end }}{{ if .Staging.Changed }} {{ .Staging.String }}{{ end }} "
  [blocks.segments.properties]
  branch_icon = ""
  fetch_status = true
  branch_identical_icon = "≡"
  branch_ahead_icon = "⇡"
  branch_behind_icon = "⇣"
  branch_gone_icon = "∅"

[[blocks]]
type = "rprompt"
alignment = "right"

  [[blocks.segments]]
  type = "node"
  style = "plain"
  foreground = "p:sage"
  template = "{{ if .PackageVersion }} {{ .PackageVersion }}{{ end }}"

  [[blocks.segments]]
  type = "python"
  style = "plain"
  foreground = "p:gold"
  template = "{{ if .Venv }} {{ .Venv }}{{ end }}"

[[blocks]]
type = "prompt"
alignment = "left"
newline = true

  [[blocks.segments]]
  type = "exit"
  style = "plain"
  foreground = "p:love"
  template = "{{ if gt .Code 0 }}{{ end }}"

  [[blocks.segments]]
  type = "text"
  style = "plain"
  foreground = "p:iris"
  template = "{{ if .Root }}#{{ else }}❯{{ end }} "

[transient_prompt]
foreground = "p:pine"
template = "❯ "

[secondary_prompt]
foreground = "p:subtle"
template = "❯❯ "
